name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  ABACUS_NO_ACTIVITY: "1"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: abacus
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: abacus
          - os: macos-14
            target: aarch64-apple-darwin
            binary: abacus
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: abacus.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked
      - run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} abacus-${{ matrix.target }}
      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} abacus-${{ matrix.target }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: abacus-${{ matrix.target }}
          path: abacus-${{ matrix.target }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum abacus-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
